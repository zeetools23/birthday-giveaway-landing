<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Party Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body {
    margin:0;
    font-family:'Poppins', sans-serif;
    background: radial-gradient(circle at 20% 30%, #ff00cc, transparent 40%),
                radial-gradient(circle at 80% 70%, #00f5ff, transparent 40%),
                linear-gradient(-45deg,#ff0080,#ff8c00,#00f5ff,#ff0000);
    background-size:400% 400%;
    animation:bgMove 8s ease infinite;
    overflow-x:hidden;
    color:white;
}
@keyframes bgMove {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(circle,rgba(255,255,255,0.15),transparent 60%);
    animation:pulse 4s infinite;
    pointer-events:none;
}
@keyframes pulse{
    0%{opacity:0.3}
    50%{opacity:0.7}
    100%{opacity:0.3}
}

/* Confetti */
.confetti{
    position:fixed;
    top:-20px;
    border-radius:3px;
    opacity:0.9;
    animation:fall linear infinite;
    z-index:1;
}
@keyframes fall{
    100%{transform:translateY(110vh) rotate(720deg);}
}

/* Banner */
.launch-banner{
    text-align:center;
    padding:14px;
    font-weight:800;
    background:rgba(0,0,0,0.6);
    letter-spacing:2px;
    font-size:14px;
}

/* Layout */
.wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:calc(100vh - 60px);
    padding:30px 20px;
    position:relative;
    z-index:5;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(25px);
    border:2px solid rgba(255,255,255,0.3);
    padding:60px 50px;
    border-radius:30px;
    max-width:600px;
    width:100%;
    text-align:center;
    box-shadow:0 0 80px rgba(255,0,128,0.6),
               0 0 150px rgba(0,255,255,0.5);
}

/* Headline */
.headline-wrap{margin-bottom:30px;}

.nuclear-headline{
    font-size:34px;
    font-weight:800;
    text-transform:uppercase;
    background:linear-gradient(90deg,#ffffff,#ffff00,#ffffff);
    background-size:200% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shineText 3s linear infinite;
}
@keyframes shineText{
    0%{background-position:200% center;}
    100%{background-position:-200% center;}
}

.prize-line{
    margin-top:15px;
    font-size:22px;
    font-weight:800;
    color:#ffff00;
    text-shadow:0 0 20px #ff8c00, 0 0 40px #ff0000;
}

/* Form */
form{display:flex;flex-direction:column;gap:18px;}
.row{display:flex;gap:18px;}
.phone-group{display:flex;gap:18px;}

input,select{
    flex:1;
    padding:18px;
    border-radius:14px;
    border:none;
    font-size:15px;
    font-weight:600;
    background:rgba(255,255,255,0.95);
}

button{
    padding:22px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,#ff00cc,#ff8c00);
    color:white;
    font-size:22px;
    font-weight:800;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 25px 50px rgba(255,0,128,0.6);
}

/* HOW IT WORKS BUTTON */
.how-btn{
    margin-top:10px;
    background:none;
    border:none;
    color:#fff;
    font-weight:600;
    text-decoration:underline;
    cursor:pointer;
}

/* MODAL */
.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.modal{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:40px;
    max-width:500px;
    text-align:center;
    box-shadow:0 0 50px #ff00cc;
    animation:popModal 0.4s ease;
}
@keyframes popModal{
    0%{transform:scale(0.7);opacity:0}
    100%{transform:scale(1);opacity:1}
}
.close{
    margin-top:20px;
    font-weight:800;
    cursor:pointer;
}

</style>
</head>

<body>

<script>
setInterval(()=>{
    for(let i=0;i<12;i++){
        let c=document.createElement("div");
        c.classList.add("confetti");
        c.style.left=Math.random()*100+"vw";
        c.style.width=(Math.random()*8+6)+"px";
        c.style.height=(Math.random()*6+4)+"px";
        c.style.background=["#ff00cc","#ff8c00","#00f5ff","#ffffff","#ffff00"][Math.floor(Math.random()*5)];
        c.style.animationDuration=(Math.random()*3+3)+"s";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),6000);
    }
},400);
</script>

<div class="launch-banner">
🚀 Launching 1st June 2026 🚀
</div>

<div class="wrapper">
<div class="card">

<div class="headline-wrap">
  <div class="nuclear-headline">
    HURRY REGISTER NOW!!
  </div>
  <div class="prize-line">
    UP TO $500 IN PRIZES!!
  </div>
</div>

<form id="entryForm">

<div class="row">
<input type="text" name="first_name" placeholder="First Name" required>
<input type="text" name="surname" placeholder="Surname" required>
</div>

<select name="sex" required>
<option value="" disabled selected>Select Sex</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
<option>Prefer not to say</option>
</select>

<input type="email" name="email" placeholder="Email Address" required>

<div class="phone-group">
<select name="country_code" required>
<option value="+61">+61</option>
<option value="+1">+1</option>
<option value="+44">+44</option>
<option value="+64">+64</option>
</select>
<input type="tel" name="phone" placeholder="Phone Number" required>
</div>

<input type="text" id="dob" name="date_of_birth" placeholder="Select Your Birthday" required>

<button type="submit">ENTER NOW 🚀</button>
<button type="button" class="how-btn" onclick="openModal()">How It Works</button>

</form>

</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
<div class="modal">
<h2>🎉 How It Works</h2>
<p>
1. Enter your details once.<br><br>
2. On your birthday, you're automatically entered into our daily prize draw.<br><br>
3. Winners are contacted directly.<br><br>
4. The more people join, the bigger the prizes grow!
</p>
<div class="close" onclick="closeModal()">CLOSE</div>
</div>
</div>

<script>
flatpickr("#dob",{dateFormat:"Y-m-d",maxDate:"today"});

function openModal(){
    document.getElementById("modal").style.display="flex";
}
function closeModal(){
    document.getElementById("modal").style.display="none";
}
document.getElementById("modal").addEventListener("click",function(e){
    if(e.target.id==="modal"){closeModal();}
});

document.getElementById("entryForm").addEventListener("submit",async function(e){
    e.preventDefault();
    const formData=new FormData(this);
    await fetch("https://formspree.io/f/xpqjgdww",{
        method:"POST",
        body:formData,
        headers:{'Accept':'application/json'}
    });
    window.location.href="thankyou.html";
});
</script>

</body>
</html>
