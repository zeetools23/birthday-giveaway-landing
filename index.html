<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.card {
    background: white;
    color: #111;
    padding: 50px 40px;
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.3);
    text-align: center;
}

h1 {
    font-size: 34px;
    font-weight: 800;
    margin-bottom: 10px;
}

.sub {
    font-size: 16px;
    margin-bottom: 25px;
    color: #555;
}

.prize {
    font-weight: 600;
    margin-bottom: 30px;
    color: #ff4e50;
}

input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
    transition: 0.2s;
}

input:focus {
    border-color: #ff4e50;
    outline: none;
}

.dob-group {
    display: flex;
    gap: 10px;
}

.dob-group input {
    text-align: center;
}

button {
    width: 100%;
    padding: 16px;
    margin-top: 20px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #ff4e50, #ff9966);
    color: white;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(255,78,80,0.4);
}

.trust {
    margin-top: 18px;
    font-size: 13px;
    color: #777;
}
.phone-group {
    display: flex;
    gap: 8px;
}

.phone-group select {
    width: 110px;
    padding: 14px 8px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
    font-family: 'Poppins', sans-serif;
    background: white;
}

.phone-group input {
    flex: 1;
}

</style>
</head>

<body>

<div class="wrapper">
    <div class="card">

        <h1>Win On Your Birthday 🎉</h1>
        <div class="sub">Enter once. Get automatically entered every year.</div>
        <div class="prize">Daily Cash & Voucher Prizes</div>

        <form action="https://formspree.io/f/xpqjgdww" method="POST">

            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <div class="phone-group">
    <select name="country_code" required>
        <option value="+61">🇦🇺 +61</option>
        <option value="+1">🇺🇸 +1</option>
        <option value="+44">🇬🇧 +44</option>
        <option value="+64">🇳🇿 +64</option>
        <option value="+91">🇮🇳 +91</option>
        <option value="+65">🇸🇬 +65</option>
        <option value="+971">🇦🇪 +971</option>
    </select>
    <input type="tel" name="phone" placeholder="Phone Number" required>
</div>

            <div class="dob-group">
                <input type="text" name="dob_day" placeholder="DD" maxlength="2" required>
                <input type="text" name="dob_month" placeholder="MM" maxlength="2" required>
                <input type="text" name="dob_year" placeholder="YYYY" maxlength="4" required>
            </div>

            <button type="submit">Enter The Giveaway</button>

        </form>

        <div class="trust">
            Your details are secure. No spam. Unsubscribe anytime.
        </div>

    </div>
</div>

</body>
</html>
