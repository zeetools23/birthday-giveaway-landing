<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Party Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>

body {
    margin:0;
    font-family:'Poppins', sans-serif;
    background: radial-gradient(circle at 20% 30%, #ff00cc, transparent 40%),
                radial-gradient(circle at 80% 70%, #00f5ff, transparent 40%),
                linear-gradient(-45deg,#ff0080,#ff8c00,#00f5ff,#ff0000);
    background-size:400% 400%;
    animation:bgMove 6s ease infinite;
    overflow-x:hidden;
    color:white;
}
@keyframes bgMove {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* Glow pulse */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(circle,rgba(255,255,255,0.15),transparent 60%);
    animation:pulse 3s infinite;
    pointer-events:none;
}
@keyframes pulse{
    0%{opacity:0.3}
    50%{opacity:0.8}
    100%{opacity:0.3}
}

/* CONFETTI RAIN */
.confetti{
    position:fixed;
    top:-20px;
    border-radius:3px;
    opacity:0.9;
    animation:fall linear infinite;
    z-index:1;
}
@keyframes fall{
    100%{transform:translateY(110vh) rotate(1080deg);}
}

/* Launch banner */
.launch-banner{
    text-align:center;
    padding:14px;
    font-weight:800;
    background:rgba(0,0,0,0.6);
    letter-spacing:2px;
    font-size:14px;
}

/* Layout */
.wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:calc(100vh - 60px);
    padding:20px;
    position:relative;
    z-index:5;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(25px);
    border:2px solid rgba(255,255,255,0.3);
    padding:50px 40px;
    border-radius:30px;
    max-width:560px;
    width:100%;
    text-align:center;
    box-shadow:0 0 60px rgba(255,0,128,0.7),
               0 0 120px rgba(0,255,255,0.6);
    animation:popIn 0.6s ease;
}
@keyframes popIn{
    0%{transform:scale(0.6);opacity:0}
    100%{transform:scale(1);opacity:1}
}

/* NUCLEAR HEADLINE */
.headline-wrap{
    margin-bottom:20px;
}

.nuclear-headline{
    font-size:36px;
    font-weight:800;
    text-transform:uppercase;
    color:#fff;
    text-shadow:
        0 0 10px #ff00cc,
        0 0 20px #ff00cc,
        0 0 40px #ff0080,
        0 0 80px #ff0000;
    animation:flash 0.8s infinite alternate,
               shake 0.8s infinite;
}

.prize-line{
    font-size:22px;
    font-weight:800;
    margin-top:10px;
    color:#ffff00;
    text-shadow:
        0 0 10px #ffff00,
        0 0 20px #ff8c00,
        0 0 40px #ff0000;
    animation:pulsePrize 1s infinite;
}

/* Animations */
@keyframes flash{
    from{opacity:1;}
    to{opacity:0.6;}
}
@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-4px);}
    50%{transform:translateX(4px);}
    75%{transform:translateX(-4px);}
    100%{transform:translateX(0);}
}
@keyframes pulsePrize{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

.sub{
    margin-bottom:20px;
    font-size:15px;
}

input,select{
    width:100%;
    padding:18px;
    margin:12px 0;
    border-radius:14px;
    border:none;
    font-size:15px;
    font-weight:600;
    background:rgba(255,255,255,0.95);
}

.row{display:flex;gap:10px;}
.phone-group{display:flex;gap:8px;}
.phone-group select{width:100px;}

button{
    width:100%;
    padding:20px;
    margin-top:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,#ff00cc,#ff8c00);
    color:white;
    font-size:22px;
    font-weight:800;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:0.3s;
}
button::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.4);
    transform:skewX(-20deg);
    animation:shine 2s infinite;
}
@keyframes shine{100%{left:200%;}}
button:hover{
    transform:scale(1.1);
    box-shadow:0 25px 50px rgba(255,0,128,0.7);
}

.info-box{
    margin-top:10px;
    font-size:14px;
    font-weight:600;
}

</style>
</head>

<body>

<script>
/* CONFETTI STORM */
setInterval(()=>{
    for(let i=0;i<20;i++){
        let c=document.createElement("div");
        c.classList.add("confetti");
        c.style.left=Math.random()*100+"vw";
        c.style.width=(Math.random()*10+6)+"px";
        c.style.height=(Math.random()*6+4)+"px";
        c.style.background=["#ff00cc","#ff8c00","#00f5ff","#ffffff","#ffff00"][Math.floor(Math.random()*5)];
        c.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),5000);
    }
},300);
</script>

<div class="launch-banner">
🚀 Launching 1st June 2026 🚀
</div>

<div class="wrapper">
<div class="card">

<div class="headline-wrap">
  <h1 class="nuclear-headline">
    🚨 HURRY REGISTER NOW!! 🚨
  </h1>
  <div class="prize-line">
    💰 UP TO $500 IN PRIZES!! 💰
  </div>
</div>

<div class="sub">Enter once. Win every year.</div>

<form id="entryForm">

<div class="row">
<input type="text" name="first_name" placeholder="First Name" required>
<input type="text" name="surname" placeholder="Surname" required>
</div>

<select name="sex" required>
<option value="" disabled selected>Select Sex</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
<option>Prefer not to say</option>
</select>

<input type="email" name="email" placeholder="Email Address" required>

<div class="phone-group">
<select name="country_code" required>
<option value="+61">+61</option>
<option value="+1">+1</option>
<option value="+44">+44</option>
<option value="+64">+64</option>
</select>
<input type="tel" name="phone" placeholder="Phone Number" required>
</div>

<input type="text" id="dob" name="date_of_birth" placeholder="Select Your Birthday" required>

<div class="info-box" id="birthdayInfo"></div>

<button type="submit">ENTER NOW 🚀</button>

</form>

</div>
</div>

<script>
flatpickr("#dob",{
    dateFormat:"Y-m-d",
    maxDate:"today",
    onChange:function(selectedDates){
        if(!selectedDates.length)return;
        const birthDate=selectedDates[0];
        const today=new Date();
        const age=today.getFullYear()-birthDate.getFullYear();
        if(age<18){
            alert("You must be 18+ to enter.");
            document.getElementById("dob").value="";
            return;
        }
        const nextBirthday=new Date(today.getFullYear(),birthDate.getMonth(),birthDate.getDate());
        if(nextBirthday<today)nextBirthday.setFullYear(today.getFullYear()+1);
        const diffDays=Math.ceil((nextBirthday-today)/(1000*60*60*24));
        const zodiac=getZodiac(birthDate.getMonth()+1,birthDate.getDate());
        document.getElementById("birthdayInfo").innerHTML=
            "🎉 "+diffDays+" days until your birthday!<br>♈ Zodiac: "+zodiac;
    }
});
function getZodiac(month,day){
    const signs=[
        ["Capricorn",1,19],["Aquarius",2,18],["Pisces",3,20],
        ["Aries",4,19],["Taurus",5,20],["Gemini",6,20],
        ["Cancer",7,22],["Leo",8,22],["Virgo",9,22],
        ["Libra",10,22],["Scorpio",11,21],["Sagittarius",12,21],
        ["Capricorn",12,31]
    ];
    for(let i=0;i<signs.length;i++){
        if(month===signs[i][1]&&day<=signs[i][2])return signs[i][0];
    }
    return "Unknown";
}
document.getElementById("entryForm").addEventListener("submit",async function(e){
    e.preventDefault();
    const formData=new FormData(this);
    await fetch("https://formspree.io/f/xpqjgdww",{
        method:"POST",
        body:formData,
        headers:{'Accept':'application/json'}
    });
    window.location.href="thankyou.html";
});
</script>

</body>
</html>
