<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #ff00cc, #ff8c00, #00f5ff, #ff0000);
    background-size: 600% 600%;
    animation: bgMove 5s ease infinite;
    overflow-x: hidden;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* CONFETTI */
.confetti {
    position: fixed;
    top: -20px;
    border-radius: 2px;
    opacity: 0.9;
    animation-name: fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    z-index: 1;
}

@keyframes fall {
    0% {
        transform: translateY(-10vh) rotate(0deg);
    }
    100% {
        transform: translateY(110vh) rotate(1080deg);
    }
}

/* CARD LAYER ABOVE CONFETTI */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    position: relative;
    z-index: 5;
}

.card {
    background: rgba(255,255,255,0.95);
    padding: 50px 40px;
    border-radius: 25px;
    width: 100%;
    max-width: 520px;
    text-align: center;
    box-shadow: 0 40px 80px rgba(0,0,0,0.35);
    animation: bounceIn 0.6s ease;
}

@keyframes bounceIn {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
}

.badge {
    background: linear-gradient(90deg, #ff00cc, #ff8c00);
    color: white;
    padding: 10px 25px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 25px;
}

h1 {
    font-size: 38px;
    font-weight: 800;
    margin-bottom: 15px;
}

.sub {
    font-size: 16px;
    margin-bottom: 30px;
}

input, select {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    border: 2px solid #eee;
    font-size: 15px;
}

.row {
    display: flex;
    gap: 10px;
}

.row input {
    flex: 1;
}

.phone-group {
    display: flex;
    gap: 8px;
}

.phone-group select {
    width: 100px;
}

.phone-group input {
    flex: 1;
}

.dob-group {
    display: flex;
    gap: 10px;
}

button {
    width: 100%;
    padding: 20px;
    margin-top: 20px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(90deg, #ff00cc, #ff8c00);
    color: white;
    font-size: 22px;
    font-weight: 800;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 25px 50px rgba(255,0,128,0.5);
}

.trust {
    margin-top: 18px;
    font-size: 13px;
}

</style>
</head>

<body>

<script>

/* INITIAL EXPLOSION */
for (let i = 0; i < 120; i++) {
    createConfetti(true);
}

/* CONTINUOUS RAIN */
setInterval(() => {
    for (let i = 0; i < 15; i++) {
        createConfetti(false);
    }
}, 400);

function createConfetti(isExplosion) {
    let confetti = document.createElement("div");
    confetti.classList.add("confetti");

    const colors = ["#ff00cc","#ff8c00","#00f5ff","#ffffff","#ffff00"];
    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];

    const size = Math.random() * 12 + 6;
    confetti.style.width = size + "px";
    confetti.style.height = size * 0.6 + "px";

    confetti.style.left = Math.random() * 100 + "vw";

    const duration = Math.random() * 3 + 3;
    confetti.style.animationDuration = duration + "s";

    if (isExplosion) {
        confetti.style.top = "50vh";
    }

    document.body.appendChild(confetti);

    setTimeout(() => {
        confetti.remove();
    }, duration * 1000);
}

</script>

<div class="wrapper">
    <div class="card">

        <div class="badge">🎉 DAILY BIRTHDAY GIVEAWAYS!! 🎉</div>

        <h1>YOU COULD WIN BIG ON YOUR BIRTHDAY</h1>
        <div class="sub">Enter your details and get automatically entered every year.</div>

        <form id="entryForm">

            <div class="row">
                <input type="text" name="first_name" placeholder="First Name" required>
                <input type="text" name="surname" placeholder="Surname" required>
            </div>

            <select name="sex" required>
                <option value="" disabled selected>Select Sex</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
                <option value="Prefer not to say">Prefer not to say</option>
            </select>

            <input type="email" name="email" placeholder="Email Address" required>

            <div class="phone-group">
                <select name="country_code" required>
                    <option value="+61">+61</option>
                    <option value="+1">+1</option>
                    <option value="+44">+44</option>
                    <option value="+64">+64</option>
                </select>
                <input type="tel" name="phone" placeholder="Phone Number" required>
            </div>

            <div class="dob-group">
                <input type="text" name="dob_day" placeholder="DD" maxlength="2" required>
                <input type="text" name="dob_month" placeholder="MM" maxlength="2" required>
                <input type="text" name="dob_year" placeholder="YYYY" maxlength="4" required>
            </div>

            <button type="submit">ENTER NOW 🚀</button>

        </form>

        <div class="trust">
            Free Entry • No Spam • Instant Registration
        </div>

    </div>
</div>

<script>
document.getElementById("entryForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    const formData = new FormData(this);

    await fetch("https://formspree.io/f/xpqjgdww", {
        method: "POST",
        body: formData,
        headers: { 'Accept': 'application/json' }
    });

    window.location.href = "thankyou.html";
});
</script>

</body>
</html>
