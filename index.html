<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Party Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(-45deg,#ff0080,#ff8c00,#00f5ff,#ff0000);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
overflow-x:hidden;
color:white;
perspective:1200px;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* floating particles */
.particle{
position:fixed;
bottom:-20px;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.3;
animation:rise linear infinite;
}
@keyframes rise{
100%{transform:translateY(-110vh);opacity:0;}
}

/* confetti */
.confetti{
position:fixed;
top:-20px;
border-radius:3px;
animation:fall linear infinite;
}
@keyframes fall{
100%{transform:translateY(110vh) translateX(40px) rotate(720deg);}
}

/* banner */
.launch-banner{
text-align:center;
padding:14px;
font-weight:800;
background:rgba(0,0,0,0.6);
letter-spacing:2px;
}

/* wrapper */
.wrapper{
display:flex;
justify-content:center;
align-items:center;
min-height:calc(100vh - 60px);
padding:30px 20px;
}

/* card with tilt + glow */
.card{
position:relative;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(30px);
border-radius:30px;
padding:60px 50px;
max-width:600px;
width:100%;
text-align:center;
box-shadow:0 0 120px rgba(255,0,128,0.6),
0 0 200px rgba(0,255,255,0.5);
transform-style:preserve-3d;
transition:transform 0.2s ease;
overflow:hidden;
}

/* moving reflection */
.card::after{
content:"";
position:absolute;
top:-100%;
left:-50%;
width:200%;
height:300%;
background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,0.15),transparent 60%);
transform:rotate(25deg);
animation:shine 8s linear infinite;
}
@keyframes shine{
0%{top:-100%}
100%{top:200%}
}

/* headline */
.nuclear-headline{
font-size:34px;
font-weight:800;
text-transform:uppercase;
background:linear-gradient(90deg,#fff,#ffff00,#fff);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shineText 5s linear infinite;
}
@keyframes shineText{
0%{background-position:200% center;}
100%{background-position:-200% center;}
}

.prize-line{
margin-top:15px;
font-size:22px;
font-weight:800;
color:#ffd700;
animation:flicker 3s infinite alternate;
}
@keyframes flicker{
0%{opacity:1;}
50%{opacity:0.8;}
100%{opacity:1;}
}

/* form */
form{
display:flex;
flex-direction:column;
gap:18px;
margin-top:30px;
}

.row,.phone-group{
display:flex;
gap:18px;
}

input,select{
flex:1;
padding:18px;
border-radius:14px;
border:none;
font-size:15px;
font-weight:600;
background:rgba(255,255,255,0.95);
transition:all 0.3s ease;
}

input:focus,select:focus{
transform:translateY(-3px);
box-shadow:0 10px 30px rgba(0,255,255,0.6);
outline:none;
}

/* magnetic button */
button{
padding:22px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#ff00cc,#ff8c00);
color:white;
font-size:22px;
font-weight:800;
cursor:pointer;
transition:transform 0.2s ease;
position:relative;
overflow:hidden;
}

button::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,0.5),transparent 60%);
animation:shimmer 4s infinite;
}
@keyframes shimmer{
0%{left:-100%;}
50%{left:120%;}
100%{left:120%;}
}

/* dob label */
.dob-wrapper{
position:relative;
text-align:left;
}
.dob-label{
position:absolute;
top:8px;
left:18px;
font-size:14px;
font-weight:600;
color:#666;
pointer-events:none;
}

/* mobile */
@media(max-width:768px){
.row,.phone-group{flex-direction:column;}
.nuclear-headline{font-size:26px;}
.prize-line{font-size:18px;}
}

</style>
</head>

<body>

<script>
// parallax tilt
document.addEventListener("mousemove",function(e){
const card=document.querySelector(".card");
const x=(window.innerWidth/2 - e.pageX)/40;
const y=(window.innerHeight/2 - e.pageY)/40;
card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

// confetti
setInterval(()=>{
for(let i=0;i<6;i++){
let c=document.createElement("div");
c.classList.add("confetti");
c.style.left=Math.random()*100+"vw";
c.style.width=(Math.random()*8+6)+"px";
c.style.height=(Math.random()*6+4)+"px";
c.style.background=["#ff00cc","#ff8c00","#00f5ff","#ffffff","#ffff00"][Math.floor(Math.random()*5)];
c.style.animationDuration=(Math.random()*3+3)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),6000);
}
},800);

// particles
setInterval(()=>{
let p=document.createElement("div");
p.classList.add("particle");
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(Math.random()*6+4)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),10000);
},600);
</script>

<div class="launch-banner">
🚀 Launching 1st June 2026 🚀
</div>

<div class="wrapper">
<div class="card">

<div class="nuclear-headline">
HURRY REGISTER NOW!!
</div>

<div class="prize-line">
UP TO $500 IN PRIZES!!
</div>

<form>

<div class="row">
<input type="text" placeholder="First Name" required>
<input type="text" placeholder="Surname" required>
</div>

<select required>
<option disabled selected>Select Sex</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
<option>Prefer not to say</option>
</select>

<input type="email" placeholder="Email Address" required>

<div class="phone-group">
<select>
<option>+61</option>
<option>+1</option>
<option>+44</option>
<option>+64</option>
</select>
<input type="tel" placeholder="Phone Number" required>
</div>

<div class="dob-wrapper">
<label class="dob-label">Select Your Birthday</label>
<input type="text" id="dob" required>
</div>

<button>ENTER NOW 🚀</button>

</form>

</div>
</div>

<script>
flatpickr("#dob",{dateFormat:"Y-m-d",maxDate:"today"});
</script>

</body>
</html>
