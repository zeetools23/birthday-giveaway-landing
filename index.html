<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Party Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>

body {
    margin:0;
    font-family:'Poppins', sans-serif;
    background: radial-gradient(circle at 20% 30%, #ff00cc, transparent 40%),
                radial-gradient(circle at 80% 70%, #00f5ff, transparent 40%),
                linear-gradient(-45deg,#ff0080,#ff8c00,#00f5ff,#ff0000);
    background-size:400% 400%;
    animation:bgMove 8s ease infinite;
    overflow-x:hidden;
    color:white;
}
@keyframes bgMove {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* Glow pulse overlay */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(circle,rgba(255,255,255,0.15),transparent 60%);
    animation:pulse 4s infinite;
    pointer-events:none;
}
@keyframes pulse{
    0%{opacity:0.3}
    50%{opacity:0.7}
    100%{opacity:0.3}
}

/* Confetti rain */
.confetti{
    position:fixed;
    top:-20px;
    border-radius:3px;
    opacity:0.9;
    animation:fall linear infinite;
    z-index:1;
}
@keyframes fall{
    100%{transform:translateY(110vh) rotate(720deg);}
}

/* Launch banner */
.launch-banner{
    text-align:center;
    padding:14px;
    font-weight:800;
    background:rgba(0,0,0,0.6);
    letter-spacing:2px;
    font-size:14px;
}

/* Layout */
.wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:calc(100vh - 60px);
    padding:30px 20px;
    position:relative;
    z-index:5;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(25px);
    border:2px solid rgba(255,255,255,0.3);
    padding:60px 50px;
    border-radius:30px;
    max-width:600px;
    width:100%;
    text-align:center;
    box-shadow:0 0 80px rgba(255,0,128,0.6),
               0 0 150px rgba(0,255,255,0.5);
    animation:popIn 0.6s ease;
}
@keyframes popIn{
    0%{transform:scale(0.85);opacity:0}
    100%{transform:scale(1);opacity:1}
}

/* HEADLINE - GLOW SWEEP EFFECT */
.headline-wrap{
    margin-bottom:30px;
}

.nuclear-headline{
    font-size:34px;
    font-weight:800;
    text-transform:uppercase;
    position:relative;
    display:inline-block;
    background:linear-gradient(90deg,#ffffff,#ffff00,#ffffff);
    background-size:200% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shineText 3s linear infinite;
    text-shadow:0 0 25px rgba(255,255,255,0.8);
}

@keyframes shineText{
    0%{background-position:200% center;}
    100%{background-position:-200% center;}
}

.prize-line{
    margin-top:15px;
    font-size:22px;
    font-weight:800;
    color:#ffff00;
    text-shadow:0 0 20px #ff8c00, 0 0 40px #ff0000;
    animation:softPulse 2s ease-in-out infinite;
}

@keyframes softPulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.sub{
    margin-bottom:30px;
    font-size:15px;
}

/* FORM SPACING CLEAN + EVEN */
form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.row{
    display:flex;
    gap:18px;
}

.phone-group{
    display:flex;
    gap:18px;
}

input,select{
    flex:1;
    padding:18px;
    border-radius:14px;
    border:none;
    font-size:15px;
    font-weight:600;
    background:rgba(255,255,255,0.95);
}

/* Button */
button{
    padding:22px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,#ff00cc,#ff8c00);
    color:white;
    font-size:22px;
    font-weight:800;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:0.3s;
}
button::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.4);
    transform:skewX(-20deg);
    animation:shine 3s infinite;
}
@keyframes shine{100%{left:200%;}}
button:hover{
    transform:scale(1.05);
    box-shadow:0 25px 50px rgba(255,0,128,0.6);
}

.info-box{
    font-size:14px;
    font-weight:600;
    min-height:40px;
}

</style>
</head>

<body>

<script>
/* Confetti storm */
setInterval(()=>{
    for(let i=0;i<15;i++){
        let c=document.createElement("div");
        c.classList.add("confetti");
        c.style.left=Math.random()*100+"vw";
        c.style.width=(Math.random()*8+6)+"px";
        c.style.height=(Math.random()*6+4)+"px";
        c.style.background=["#ff00cc","#ff8c00","#00f5ff","#ffffff","#ffff00"][Math.floor(Math.random()*5)];
        c.style.animationDuration=(Math.random()*3+3)+"s";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),6000);
    }
},400);
</script>

<div class="launch-banner">
🚀 Launching 1st June 2026 🚀
</div>

<div class="wrapper">
<div class="card">

<div class="headline-wrap">
  <div class="nuclear-headline">
    HURRY REGISTER NOW!!
  </div>
  <div class="prize-line">
    UP TO $500 IN PRIZES!!
  </div>
</div>

<div class="sub">Enter once. Win every year.</div>

<form id="entryForm">

<div class="row">
<input type="text" name="first_name" placeholder="First Name" required>
<input type="text" name="surname" placeholder="Surname" required>
</div>

<select name="sex" required>
<option value="" disabled selected>Select Sex</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
<option>Prefer not to say</option>
</select>

<input type="email" name="email" placeholder="Email Address" required>

<div class="phone-group">
<select name="country_code" required>
<option value="+61">+61</option>
<option value="+1">+1</option>
<option value="+44">+44</option>
<option value="+64">+64</option>
</select>
<input type="tel" name="phone" placeholder="Phone Number" required>
</div>

<input type="text" id="dob" name="date_of_birth" placeholder="Select Your Birthday" required>

<div class="info-box" id="birthdayInfo"></div>

<button type="submit">ENTER NOW 🚀</button>

</form>

</div>
</div>

<script>
flatpickr("#dob",{
    dateFormat:"Y-m-d",
    maxDate:"today",
    onChange:function(selectedDates){
        if(!selectedDates.length)return;
        const birthDate=selectedDates[0];
        const today=new Date();
        const age=today.getFullYear()-birthDate.getFullYear();
        if(age<18){
            alert("You must be 18+ to enter.");
            document.getElementById("dob").value="";
            return;
        }
        const nextBirthday=new Date(today.getFullYear(),birthDate.getMonth(),birthDate.getDate());
        if(nextBirthday<today)nextBirthday.setFullYear(today.getFullYear()+1);
        const diffDays=Math.ceil((nextBirthday-today)/(1000*60*60*24));
        document.getElementById("birthdayInfo").innerHTML=
            "🎉 "+diffDays+" days until your birthday!";
    }
});
document.getElementById("entryForm").addEventListener("submit",async function(e){
    e.preventDefault();
    const formData=new FormData(this);
    await fetch("https://formspree.io/f/xpqjgdww",{
        method:"POST",
        body:formData,
        headers:{'Accept':'application/json'}
    });
    window.location.href="thankyou.html";
});
</script>

</body>
</html>
