<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Giveaway</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff4e50, #fc913a);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 16px;
    width: 90%;
    max-width: 500px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

p {
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
}

.dob-group {
    display: flex;
    gap: 10px;
}

.dob-group input {
    flex: 1;
    text-align: center;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    background: #ff4e50;
    border: none;
    color: white;
    font-size: 18px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #e63e40;
}
</style>
</head>

<body>

<div class="container">
    <h1>Win Daily Birthday Prizes 🎉</h1>
    <p>Enter your details for a chance to win prizes on your birthday.</p>

    <form action="https://formspree.io/f/xpqjgdww" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>

        <div class="dob-group">
            <input type="text" name="dob_day" placeholder="DD" maxlength="2" required>
            <input type="text" name="dob_month" placeholder="MM" maxlength="2" required>
            <input type="text" name="dob_year" placeholder="YYYY" maxlength="4" required>
        </div>

        <button type="submit">Enter Giveaway</button>
    </form>
</div>

</body>
</html>
