<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #ff00cc, #ff8c00, #00f5ff, #ff00cc);
    background-size: 400% 400%;
    animation: bgMove 6s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    color: white;
    overflow: hidden;
}
@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
h1 {
    font-size: 60px;
    margin-bottom: 10px;
}
p {
    font-size: 22px;
    margin-bottom: 30px;
}
a.button {
    background: white;
    color: #ff0080;
    padding: 15px 35px;
    border-radius: 50px;
    font-weight: 800;
    font-size: 18px;
    text-decoration: none;
    transition: 0.3s;
}
a.button:hover {
    transform: scale(1.1);
}
.confetti {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    opacity: 1;
    animation: explode 1.6s ease-out forwards;
}
@keyframes explode {
    to {
        transform: translate(var(--x), var(--y)) rotate(720deg);
        opacity: 0;
    }
}
</style>
</head>
<body>
<script>
// confetti explosion on page load
for (let i = 0; i < 200; i++) {
    let conf = document.createElement('div');
    conf.classList.add('confetti');
    conf.style.background = ["#ff00cc","#ff8c00","#00f5ff","#ffffff"][Math.floor(Math.random()*4)];
    conf.style.setProperty('--x', (Math.random()*1000 - 500)+'px');
    conf.style.setProperty('--y', (Math.random()*800 - 400)+'px');
    document.body.appendChild(conf);
}
</script>
<div>
    <h1>Thank You! 🎉</h1>
    <p>Your entry has been received.</p>
    <a href="/" class="button">Back to Home</a>
</div>
</body>
</html>
