<!DOCTYPE html>
<html>
<head>

<title>Thank You</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:
radial-gradient(circle at 20% 30%,#ff00cc,transparent 40%),
radial-gradient(circle at 80% 70%,#00f5ff,transparent 40%),
linear-gradient(-45deg,#ff0080,#ff8c00,#00f5ff,#ff0000);
background-size:400% 400%;
animation:bgMove 8s ease infinite;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(25px);
border-radius:30px;
padding:60px;
max-width:500px;
box-shadow:0 0 80px rgba(255,0,128,0.6),
0 0 150px rgba(0,255,255,0.5);
}

h1{
font-size:36px;
margin-bottom:15px;
}

p{
font-size:20px;
}

</style>

</head>

<body>

<div class="card">

<h1>🎉 You Are Registered</h1>

<p>
Your birthday entry has been recorded.
<br><br>
Good luck in the prize draw.
</p>

</div>

</body>
</html>
